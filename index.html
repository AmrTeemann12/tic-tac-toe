<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="icon" href="images/tic-tac-toe-icon.svg" type="image/svg+xml">
    <title>TicTacToe</title>
</head>
<body>
    <header>
        <h1>Tic Tac Toe game</h1>
    </header>
    <main>
        <div class="instructions">
            <ul>
                <li>Click player's name to change name</li>
                <li>Click player's mark to toggle marks</li>
                <li>Player X always plays first</li>
                <li>After round end click anywhere on the board to start a new round</li>
            </ul>
        </div>
        <div class="players">
            <div class="player">
                <div class="name a-name">
                    <input
                        type="text"
                        placeholder="Enter name"
                        value="player 1"
                        maxlength="18">
                </div>
                <div class="mark a-mark">
                    <button data-mark="x">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <line x1="22" y1="22" x2="78" y2="78" stroke="#4A90E2" stroke-width="10" stroke-linecap="round"/>
                            <line x1="78" y1="22" x2="22" y2="78" stroke="#4A90E2" stroke-width="10" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <div class="score a-score">
                    <output>0</output>
                </div>
            </div>
            <div class="player">
                <div class="name b-name">
                    <input 
                        type="text"
                        placeholder="Enter name"
                        value="player 2"
                        maxlength="20">
                </div>
                <div class="mark b-mark">
                    <button data-mark="o">
                        <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="31" stroke="#E25C4A" stroke-width="10" fill="none" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <div class="score b-score">
                    <output>0</output>
                </div>
            </div>
        </div>
        <div class="game-container">
            <div class="line-container"></div>
            <div class="grid-container">
                <div class="slot" data-row="0" data-col="0"></div>
                <div class="slot" data-row="0" data-col="1"></div>
                <div class="slot" data-row="0" data-col="2"></div>
                <div class="slot" data-row="1" data-col="0"></div>
                <div class="slot" data-row="1" data-col="1"></div>
                <div class="slot" data-row="1" data-col="2"></div>
                <div class="slot" data-row="2" data-col="0"></div>
                <div class="slot" data-row="2" data-col="1"></div>
                <div class="slot" data-row="2" data-col="2"></div>
            </div>
        </div>
        <div class="round-result">
            <p class="result-text"></p>
        </div>
        <div class="error-container">
            <p class="error-text"></p>
        </div>
        <div class="new-round">
            <button class="new-round-btn">New Round</button>
        </div>
    </main>
</body>
</html>
